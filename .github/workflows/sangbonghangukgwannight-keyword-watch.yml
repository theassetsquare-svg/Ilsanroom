name: Sangbonghangukgwannight Keyword Watch (상봉동한국관나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 08:30 (UTC 23:30) — bundangpongpongnight 08:25 직후
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run sangbonghangukgwannight-keyword-watch
        run: node scripts/sangbonghangukgwannight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
