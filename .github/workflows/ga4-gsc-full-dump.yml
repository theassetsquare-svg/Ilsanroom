name: GA4+GSC Full Dump (read-only)

# GA4 전 차원·전 지표 + GSC 전 URL·전 검색어 + 색인커버리지를 API로 ★읽기만 덤프(변경 0).
# 색인검사(URL Inspection ~2s/URL)는 느려 별 job 으로 분리 — 검색분석/GA4 로그를 즉시 회수.
# sitemap 재제출·indexing publish·메일 0. RESEND 미주입.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: GA4 full dimension dump (read-only)
        run: node scripts/ga4-full-dump.mjs | tee ga4-full.txt
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
      - name: GSC search analytics full (read-only, no index)
        run: node scripts/gsc-full-dump.mjs --no-index | tee gsc-search.txt
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
      - name: Upload analytics dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ga4-gsc-analytics
          path: |
            ga4-full.txt
            gsc-search.txt
          retention-days: 14

  indexcoverage:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: GSC index coverage via URL Inspection (read-only)
        run: node scripts/gsc-full-dump.mjs --only-index | tee gsc-index.txt
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
      - name: Upload index coverage dump
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsc-index-coverage
          path: gsc-index.txt
          retention-days: 14
