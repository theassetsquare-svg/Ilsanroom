name: GA4+GSC Full Dump (read-only)

# GA4 전 차원·전 지표 + GSC 전 URL·전 검색어·색인커버리지를 API로 ★읽기만 덤프(변경 0).
# 온디맨드 수동 실행. sitemap 재제출·indexing publish·메일 0. RESEND 미주입.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: GA4 full dimension dump (read-only)
        run: node scripts/ga4-full-dump.mjs | tee ga4-full.txt
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
      - name: GSC full data + index coverage (read-only)
        run: node scripts/gsc-full-dump.mjs | tee gsc-full.txt
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
      - name: Upload dumps as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ga4-gsc-full-dump
          path: |
            ga4-full.txt
            gsc-full.txt
          retention-days: 14
