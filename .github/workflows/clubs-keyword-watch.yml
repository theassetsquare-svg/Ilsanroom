name: Clubs Keyword Watch (/clubs 클럽 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 12:10 (UTC 03:10) — 시즌131
    - cron: '10 3 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run clubs-keyword-watch
        run: node scripts/clubs-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
