name: Jangandong Hoppa Flex Keyword Watch (장안동호빠 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 11:25 (UTC 02:25) — 시즌123
    - cron: '25 2 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run jangandong-hoppa-flex-keyword-watch
        run: node scripts/jangandong-hoppa-flex-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
