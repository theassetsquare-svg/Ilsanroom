name: GA4 Optimizer (daily)

# GA4 점수를 끌어올릴 "1페이지 + 구체 처방" 자동 발견 (읽기 전용).
# ga-health(약한 페이지 목록)와 역할 분리 — 본 워크플로는 우선순위×근본원인→처방.
# ★수치 조작 0: GA에 가짜 이벤트 주입 절대 안 함(활동조작 페널티 방지). 진짜 콘텐츠 개선만 제시.
# 100% 읽기 전용(GA Data API 읽기만, 사이트 변경 0). 처방 있을 때만 메일(자가수렴).
on:
  schedule:
    # 매일 KST 09:10 (UTC 00:10) — ga-health 08:00 / northstar 08:20 와 시간 분리
    - cron: '10 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ga-optimizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: GA4 optimizer (read-only)
        run: node scripts/ga-optimizer.mjs
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
