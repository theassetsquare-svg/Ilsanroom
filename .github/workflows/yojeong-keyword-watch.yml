name: Yojeong Keyword Watch (요정 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 11:50 (UTC 02:50) — 시즌128
    - cron: '50 2 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run yojeong-keyword-watch
        run: node scripts/yojeong-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
