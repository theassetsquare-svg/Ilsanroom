name: Itaewon Savage Keyword Watch (이태원클럽 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 13:20 (UTC 04:20) — 시즌146
    - cron: '20 4 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run itaewon-savage-keyword-watch
        run: node scripts/itaewon-savage-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
