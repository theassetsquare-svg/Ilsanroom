name: CrUX Daily (실사용자 Core Web Vitals)

on:
  schedule:
    # 매일 KST 05:00 (UTC 20:00 전날) — Lighthouse(04:00) 직후
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect CrUX (실사용자 p75)
        run: node scripts/nolcool-crux-collect.mjs
        env:
          CRUX_API_KEY: ${{ secrets.CRUX_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Send daily report (Resend)
        run: node scripts/nolcool-crux-report.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
