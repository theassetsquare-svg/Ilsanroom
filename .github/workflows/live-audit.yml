name: Live Site Audit (Daily)

on:
  schedule:
    # KST 09:00 (UTC 00:00) — 매일 아침 라이브 감사
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run live audit
        id: audit
        run: |
          node scripts/nolcool-live-audit.mjs --save /tmp/audit.json 2>&1 | tee /tmp/audit.txt
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-audit-report
          path: |
            /tmp/audit.json
            /tmp/audit.txt
          retention-days: 14

      - name: Fail if ERR > 0
        run: |
          if [ -f /tmp/audit.json ]; then
            err=$(node -e "console.log(require('/tmp/audit.json').errCnt || 0)")
            warn=$(node -e "console.log(require('/tmp/audit.json').warnCnt || 0)")
            echo "ERR=$err WARN=$warn"
            if [ "$err" -gt 0 ]; then
              echo "::error::Live audit found $err errors"
              exit 1
            fi
          fi
