name: Keyword SEO Monitor (일산명월관 / 일산요정)

on:
  schedule:
    # 매일 KST 06:00 (UTC 21:00) — 라이브 페이지 SEO 회귀 감사
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run keyword SEO monitor
        run: node scripts/keyword-seo-monitor.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
