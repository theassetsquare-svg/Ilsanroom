name: Google Issue Monitor (서치콘솔 문제 자동 감지·해결)

on:
  schedule:
    # 매일 KST 08:30 (UTC 23:30) — google-reindex(07:30) 1시간 뒤, 색인 반영 후
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Search Console 문제 스캔 + 자동 재제출 + 강제 재크롤 + 리포트
        run: node scripts/google-issue-monitor.mjs --request-indexing
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
