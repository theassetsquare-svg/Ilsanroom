name: Audit PR (guard + dist)

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'vite.config.ts'
  push:
    branches: [main]

jobs:
  guard-src:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Guard src (all ts/tsx)
        id: guard
        run: |
          set +e
          fail=0
          for f in $(find src -type f \( -name '*.ts' -o -name '*.tsx' \)); do
            out=$(echo "{\"tool_name\":\"Write\",\"tool_input\":{\"file_path\":\"$PWD/$f\"}}" | node scripts/nolcool-guard.mjs post 2>&1)
            if [ $? -ne 0 ]; then
              echo "::error file=$f::guard violation"
              echo "$out"
              fail=1
            fi
          done
          exit $fail

      # 시즌175 — scripts/*.mjs 전수 syntax 차단 (시즌168 broken refactor 재발 방지)
      - name: Syntax gate (all scripts/*.mjs)
        run: |
          set +e
          fail=0
          for f in $(find scripts -maxdepth 2 -type f -name '*.mjs'); do
            err=$(node -c "$f" 2>&1)
            if [ -n "$err" ]; then
              echo "::error file=$f::syntax error"
              echo "$err"
              fail=1
            fi
          done
          if [ $fail -ne 0 ]; then
            echo "scripts/*.mjs 문법 에러 — push 차단 (cron 노이즈 사전 차단)"
            exit 1
          fi
          echo "✓ scripts/*.mjs 전수 syntax OK"

      - name: Build + dist audit
        run: npm run build

      - name: Upload dist audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-audit-${{ github.run_id }}
          path: |
            dist/sitemap.xml
            dist/robots.txt
          retention-days: 7
