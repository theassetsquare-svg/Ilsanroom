name: Gangnam Hoppa Again Keyword Watch (강남호빠+서울호빠 2 키워드 24h)

on:
  schedule:
    # 매일 KST 10:15 (UTC 01:15) — gangnamhoppa-royal 10:10 직후
    - cron: '15 1 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gangnam-hoppa-again-keyword-watch
        run: node scripts/gangnam-hoppa-again-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
