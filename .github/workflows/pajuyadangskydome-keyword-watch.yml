name: Paju Yadang Skydome Keyword Watch (파주야당스카이돔나이트 + 파주나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 09:55 (UTC 00:55) — cheonankorea 09:50 직후
    - cron: '55 0 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pajuyadangskydome-keyword-watch
        run: node scripts/pajuyadangskydome-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
