name: zzz Notif Verify (oneshot)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/_notif_verify.mjs'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify notify trigger
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/_notif_verify.mjs
