name: Itaewonclub Maid Keyword Watch (이태원클럽 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 13:15 (UTC 04:15) — 시즌145
    - cron: '15 4 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run itaewonclub-maid-keyword-watch
        run: node scripts/itaewonclub-maid-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
