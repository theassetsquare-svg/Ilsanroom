name: Geondaehoppa W Keyword Watch (건대호빠+서울호빠 2 키워드 24h)

on:
  schedule:
    # 매일 KST 10:25 (UTC 01:25) — gangnam-hoppa-flirting 10:20 직후
    - cron: '25 1 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run geondaehoppa-w-keyword-watch
        run: node scripts/geondaehoppa-w-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
