name: Suyushampoonight Keyword Watch (수유샴푸나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 08:50 (UTC 23:50) — suwonkoreanight 08:45 직후
    - cron: '50 23 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run suyushampoonight-keyword-watch
        run: node scripts/suyushampoonight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
