name: Google Re-Index (Sitemap + Inspect)

on:
  push:
    branches: [main]
    paths:
      - 'src/data/**'
      - 'src/lib/seo-hooks.ts'
      - 'scripts/prerender-seo.mjs'
  schedule:
    # 매일 KST 07:30 (UTC 22:30) — IndexNow 30분 뒤
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for CF Pages deploy
        if: github.event_name != 'schedule'
        run: node scripts/lib/wait-for-deploy.mjs

      - name: Submit to Google Search Console + Inspect samples
        run: node scripts/google-reindex.mjs
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
