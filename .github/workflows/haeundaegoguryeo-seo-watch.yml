name: Haeundaegoguryeo SEO Watch (해운대고구려 단일 페이지 24h)

on:
  schedule:
    # 매일 KST 07:00 (UTC 22:00) — venue-name-seo-monitor 06:00 직후
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run haeundaegoguryeo-seo-watch
        run: node scripts/haeundaegoguryeo-seo-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
