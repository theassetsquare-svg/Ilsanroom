name: SEO Deep Audit Watch (전수 7축 24h)

on:
  schedule:
    # 매일 KST 12:00 (UTC 03:00) — 시즌130
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run seo-deep-audit-watch
        run: node scripts/seo-deep-audit-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
