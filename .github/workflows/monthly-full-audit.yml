name: Monthly Full Audit (매달 30일 전수점검·자동해결·해결보고 1통)

on:
  schedule:
    # UTC 29일 22:00 = KST 30일 07:00 (2월은 30일이 없어 미실행 — 3/30에 2월분 포함 커버)
    - cron: '0 22 29 * *'
  workflow_dispatch:

jobs:
  monthly-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GSC+GA4 전수 확인 + 자동해결(재크롤 신호만) + 해결시만 메일 1통
        run: node scripts/monthly-full-audit.mjs
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
