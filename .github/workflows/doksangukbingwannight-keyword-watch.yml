name: Doksangukbingwannight Keyword Watch (독산동국빈관나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 08:00 (UTC 23:00) — incheonarabiannight 07:55 직후
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run doksangukbingwannight-keyword-watch
        run: node scripts/doksangukbingwannight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
