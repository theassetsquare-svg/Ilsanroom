name: Bundangpongpongnight Keyword Watch (분당퐁퐁나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 08:25 (UTC 23:25) — bucheonmeritnight 08:20 직후
    - cron: '25 23 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run bundangpongpongnight-keyword-watch
        run: node scripts/bundangpongpongnight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
