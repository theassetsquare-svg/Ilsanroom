name: Gangnam Hoppa Royal Keyword Watch (강남호빠+서울호빠 2 키워드 24h)

on:
  schedule:
    # 매일 KST 10:10 (UTC 01:10) — haeundaehoppa-kkantappiya 10:05 직후
    - cron: '10 1 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gangnamhoppa-royal-keyword-watch
        run: node scripts/gangnamhoppa-royal-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
