name: Itaewonclub Utopia Keyword Watch (이태원클럽 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 13:25 (UTC 04:25) — 시즌147
    - cron: '25 4 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run itaewonclub-utopia-keyword-watch
        run: node scripts/itaewonclub-utopia-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
