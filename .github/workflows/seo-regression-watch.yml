name: SEO Regression Watch (title dup + 하단 overlap 24h)

on:
  schedule:
    # 매일 KST 07:15 (UTC 22:15) — haeundaegoguryeo(07:00) / venue(06:00) 직후
    - cron: '15 22 * * *'
  workflow_dispatch:

jobs:
  title-dup:
    name: title 중복단어/홈외 놀쿨/venue nameFirst 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run title-dup-live-watch
        run: node scripts/title-dup-live-watch.mjs
        env:
          ORIGIN: https://nolcool.com
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

  fixed-overlap:
    name: PC+Mobile 하단 fixed/sticky + PhoneBar 모달 회귀
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Run mobile-fixed-overlap-watch
        env:
          ORIGIN: https://nolcool.com
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          export CHROMIUM_PATH=$(which chrome || which google-chrome || which chromium)
          echo "Chrome: $CHROMIUM_PATH"
          node scripts/mobile-fixed-overlap-watch.mjs
