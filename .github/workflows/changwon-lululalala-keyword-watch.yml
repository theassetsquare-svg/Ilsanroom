name: Changwon Lululalala Keyword Watch (창원룰루랄라나이트 + 창원나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 09:40 (UTC 00:40) — jejunight 09:35 직후
    - cron: '40 0 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run changwon-lululalala-keyword-watch
        run: node scripts/changwon-lululalala-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
