name: Suwonhoppa Beast Keyword Watch (수원호빠 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 11:10 (UTC 02:10) — 시즌120
    - cron: '10 2 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run suwonhoppa-beast-keyword-watch
        run: node scripts/suwonhoppa-beast-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
