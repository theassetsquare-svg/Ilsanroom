name: Monthly Billing Report

# 매월 1일 KST 08:00 (UTC 전일 23:00) — GitHub Actions / Cloudflare Pages / Resend 사용량 + 요금
on:
  schedule:
    - cron: '0 23 1 * *'  # UTC 매월 1일 23:00 = KST 매월 2일 08:00
  workflow_dispatch:

jobs:
  billing:
    runs-on: ubuntu-latest
    steps:
      - name: Collect usage and send email
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          node -e '
          const https = require("https");
          const { GH_TOKEN, CF_API_TOKEN, CF_ACCOUNT_ID, CF_PAGES_PROJECT, RESEND_API_KEY, NOTIFY_EMAIL, REPO } = process.env;

          const req = (opts, body) => new Promise((resolve, reject) => {
            const r = https.request(opts, res => {
              let d = "";
              res.on("data", c => d += c);
              res.on("end", () => resolve({ status: res.statusCode, body: d }));
            });
            r.on("error", reject);
            if (body) r.write(body);
            r.end();
          });

          const ghHeaders = { "Authorization": `Bearer ${GH_TOKEN}`, "Accept": "application/vnd.github+json", "User-Agent": "nolcool-billing", "X-GitHub-Api-Version": "2022-11-28" };

          // 지난 달 1일 ~ 말일 (UTC)
          const now = new Date();
          const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
          const thisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
          const since = lastMonth.toISOString();
          const until = thisMonth.toISOString();
          const label = `${lastMonth.getFullYear()}-${String(lastMonth.getMonth()+1).padStart(2,"0")}`;

          (async () => {
            // 1) GitHub Actions — 지난 달 실행된 워크플로 합계
            let ghRuns = 0, ghMinutes = 0, ghFailed = 0;
            let page = 1;
            while (page < 30) {
              const { status, body } = await req({
                hostname: "api.github.com",
                path: `/repos/${REPO}/actions/runs?per_page=100&page=${page}&created=${since.slice(0,10)}..${until.slice(0,10)}`,
                headers: ghHeaders,
              });
              if (status !== 200) break;
              const j = JSON.parse(body);
              if (!j.workflow_runs || j.workflow_runs.length === 0) break;
              for (const r of j.workflow_runs) {
                ghRuns++;
                if (r.conclusion === "failure") ghFailed++;
                const start = new Date(r.run_started_at || r.created_at).getTime();
                const end = new Date(r.updated_at).getTime();
                ghMinutes += Math.max(0, (end - start) / 60000);
              }
              if (j.workflow_runs.length < 100) break;
              page++;
            }

            // public repo면 비용 $0 (Actions 무제한)
            const repoInfo = await req({
              hostname: "api.github.com",
              path: `/repos/${REPO}`,
              headers: ghHeaders,
            });
            const isPublic = repoInfo.status === 200 && JSON.parse(repoInfo.body).private === false;
            const ghCost = isPublic ? 0 : Math.max(0, ghMinutes - 2000) * 0.008; // 무료 2000분 후 분당 $0.008

            // 2) Cloudflare Pages — 지난 달 배포 수 (secret 없으면 skip)
            let cfBuilds = "(CF_API_TOKEN 미설정 — secret 추가 시 자동 활성)";
            let cfCost = 0;
            if (CF_API_TOKEN && CF_ACCOUNT_ID && CF_PAGES_PROJECT) {
              try {
                const { status, body } = await req({
                  hostname: "api.cloudflare.com",
                  path: `/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PAGES_PROJECT}/deployments?per_page=100`,
                  headers: { "Authorization": `Bearer ${CF_API_TOKEN}`, "Content-Type": "application/json" },
                });
                if (status === 200) {
                  const j = JSON.parse(body);
                  const sinceMs = lastMonth.getTime();
                  const untilMs = thisMonth.getTime();
                  const builds = (j.result || []).filter(d => {
                    const t = new Date(d.created_on).getTime();
                    return t >= sinceMs && t < untilMs;
                  });
                  cfBuilds = `${builds.length} 빌드 (Free 한도 500/월)`;
                  cfCost = builds.length > 500 ? (builds.length - 500) * 0.005 : 0;
                } else {
                  cfBuilds = `(CF API ${status} — 토큰 권한 확인 필요)`;
                }
              } catch (e) {
                cfBuilds = `(CF API 에러: ${e.message})`;
              }
            }

            // 3) Resend — 공식 사용량 API 없음, 추정 (Free 3000건/월)
            const resendNote = "Resend Free: 월 3,000건 / 일 100건 한도. 초과 시 Pro $20/월. 대시보드 직접 확인.";

            const totalCost = ghCost + cfCost;

            const subject = `📊 ${label} 놀쿨 월간 요금 리포트 — $${totalCost.toFixed(2)}`;
            const html = `
              <div style="font-family:-apple-system,sans-serif;color:#111;max-width:600px;margin:0 auto;padding:20px">
                <h1 style="color:#7C3AED;margin:0 0 8px">📊 ${label} 놀쿨 요금 리포트</h1>
                <p style="color:#666;margin:0 0 24px">집계: ${label}-01 ~ ${label}-말일 (UTC)</p>

                <div style="background:#F5F5F5;padding:16px;border-radius:8px;margin-bottom:16px">
                  <h2 style="margin:0 0 12px;font-size:18px">💰 총 비용: <span style="color:${totalCost > 0 ? "#DC2626" : "#059669"}">$${totalCost.toFixed(2)}</span></h2>
                  <p style="margin:0;color:${totalCost > 0 ? "#DC2626" : "#059669"};font-size:14px">${totalCost === 0 ? "✅ 이번 달 청구 비용 없음" : "⚠️ 무료 한도 초과 — 아래 상세 확인"}</p>
                </div>

                <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
                  <thead>
                    <tr style="background:#7C3AED;color:#fff">
                      <th style="text-align:left;padding:10px">서비스</th>
                      <th style="text-align:right;padding:10px">사용량</th>
                      <th style="text-align:right;padding:10px">비용</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr style="border-bottom:1px solid #eee">
                      <td style="padding:10px"><b>GitHub Actions</b><br><span style="color:#666;font-size:12px">${isPublic ? "Public 저장소 — 무제한 무료" : "Private 저장소 — 2,000분 무료 후 분당 $0.008"}</span></td>
                      <td style="padding:10px;text-align:right">${ghRuns} 실행<br><span style="color:#666;font-size:12px">${ghMinutes.toFixed(1)}분 / 실패 ${ghFailed}건</span></td>
                      <td style="padding:10px;text-align:right;color:${ghCost > 0 ? "#DC2626" : "#059669"}">$${ghCost.toFixed(2)}</td>
                    </tr>
                    <tr style="border-bottom:1px solid #eee">
                      <td style="padding:10px"><b>Cloudflare Pages</b><br><span style="color:#666;font-size:12px">Free: 500빌드/월, 무제한 트래픽</span></td>
                      <td style="padding:10px;text-align:right">${cfBuilds}</td>
                      <td style="padding:10px;text-align:right;color:${cfCost > 0 ? "#DC2626" : "#059669"}">$${cfCost.toFixed(2)}</td>
                    </tr>
                    <tr style="border-bottom:1px solid #eee">
                      <td style="padding:10px"><b>Resend (이메일)</b><br><span style="color:#666;font-size:12px">${resendNote}</span></td>
                      <td style="padding:10px;text-align:right">—</td>
                      <td style="padding:10px;text-align:right;color:#059669">$0.00</td>
                    </tr>
                    <tr>
                      <td style="padding:10px"><b>Supabase</b><br><span style="color:#666;font-size:12px">Free: DB 500MB / 스토리지 1GB. 초과 시 Pro $25/월</span></td>
                      <td style="padding:10px;text-align:right">대시보드 확인</td>
                      <td style="padding:10px;text-align:right;color:#059669">$0.00</td>
                    </tr>
                  </tbody>
                </table>

                <div style="background:#FFF7ED;border-left:4px solid #F59E0B;padding:12px;margin-bottom:16px">
                  <b>📌 메모</b>
                  <ul style="margin:8px 0 0;padding-left:20px;color:#555">
                    <li>GitHub Actions Public 저장소 = <b>영구 무료</b>. 가격 0원 유지 권장.</li>
                    <li>Cloudflare 사용량은 ${CF_API_TOKEN ? "API로 자동 수집" : "<b>CF_API_TOKEN secret 추가 시 자동 활성</b>"}.</li>
                    <li>Resend / Supabase는 공식 API 부재 — 초과 알림은 각 대시보드 확인 필요.</li>
                  </ul>
                </div>

                <p style="color:#999;font-size:12px;margin:24px 0 0;text-align:center">
                  놀쿨 자동 요금 알림 · 매월 1일 KST 08:00 발송<br>
                  /admin → 운영 대시보드에서 실시간 사용량 확인
                </p>
              </div>
            `;

            const emailBody = JSON.stringify({
              from: "놀쿨 요금봇 <noreply@nolcool.com>",
              to: [NOTIFY_EMAIL],
              subject,
              html,
            });

            const { status: emailStatus, body: emailResp } = await req({
              hostname: "api.resend.com",
              path: "/emails",
              method: "POST",
              headers: {
                "Authorization": `Bearer ${RESEND_API_KEY}`,
                "Content-Type": "application/json",
                "Content-Length": Buffer.byteLength(emailBody),
              },
            }, emailBody);

            console.log(`📊 GitHub Actions: ${ghRuns} runs / ${ghMinutes.toFixed(1)} min / $${ghCost.toFixed(2)}`);
            console.log(`📊 Cloudflare Pages: ${cfBuilds} / $${cfCost.toFixed(2)}`);
            console.log(`💰 Total: $${totalCost.toFixed(2)}`);
            console.log(`📧 Email status: ${emailStatus}`);
            if (emailStatus >= 400) {
              console.error(emailResp);
              process.exit(1);
            }
          })().catch(e => { console.error(e); process.exit(1); });
          '
