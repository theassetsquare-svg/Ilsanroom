name: Jejunight Keyword Watch (제주나이트 + 제주도나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 09:35 (UTC 00:35) — ilsanshampoonight 09:30 직후
    - cron: '35 0 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run jejunight-keyword-watch
        run: node scripts/jejunight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
