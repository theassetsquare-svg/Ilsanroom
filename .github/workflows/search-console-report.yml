name: Search Console Report (키워드/클릭)

on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 KST 09:00 (UTC 00:00)
    - cron: '0 0 * * 1'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Search Console 검색분석 리포트
        run: node scripts/search-console-report.mjs
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
