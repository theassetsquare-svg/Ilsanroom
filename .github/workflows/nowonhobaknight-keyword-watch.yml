name: Nowonhobaknight Keyword Watch (노원호박나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 07:30 (UTC 22:30) — gildongchance 07:25 직후
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run nowonhobaknight-keyword-watch
        run: node scripts/nowonhobaknight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
