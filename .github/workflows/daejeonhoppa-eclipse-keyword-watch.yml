name: Daejeonhoppa Eclipse Keyword Watch (대전호빠+충청호빠 2 키워드 24h)

on:
  schedule:
    # 매일 KST 10:35 (UTC 01:35) — daeguhoppa-perfect 10:30 직후
    - cron: '35 1 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run daejeonhoppa-eclipse-keyword-watch
        run: node scripts/daejeonhoppa-eclipse-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
