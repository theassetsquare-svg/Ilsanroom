name: Daejeononenight Keyword Watch (대전원나이트 SEO + 정책 24h)

on:
  schedule:
    # 매일 KST 07:50 (UTC 22:50) — gangnamjuliananight 07:45 직후
    - cron: '50 22 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run daejeononenight-keyword-watch
        run: node scripts/daejeononenight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
