name: Sunday Deep Audit (Sitemap Fullcheck)

# 매주 일요일 KST 03:00 (UTC 토요일 18:00) 정각에 sitemap 515 URL 풀체크.
# 4xx/5xx/네트워크 에러 1건 이상이면 Resend 이메일 알림.
# 평일 워크플로(browser-audit, deep-audit, live-audit, lighthouse-daily)와 별개 — 주말 컨테이너.

on:
  schedule:
    - cron: '0 18 * * 6'
  workflow_dispatch:

jobs:
  sitemap-fullcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sitemap fullcheck (515 URL)
        id: fullcheck
        env:
          SITE: https://nolcool.com
          CONCURRENCY: '16'
        run: |
          set -o pipefail
          node scripts/nolcool-sitemap-fullcheck.mjs 2>&1 | tee /tmp/sitemap-fullcheck.txt
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sitemap-fullcheck-${{ github.run_id }}
          path: |
            audit-reports/sitemap-fullcheck-*.md
            /tmp/sitemap-fullcheck.txt
          retention-days: 30

      - name: Send email alert on failure
        if: steps.fullcheck.outcome == 'failure'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFICATION_EMAIL" ]; then
            echo "::warning::RESEND_API_KEY/NOTIFICATION_EMAIL 미설정 — 알림 skip"
            exit 0
          fi
          SUMMARY=$(tail -20 /tmp/sitemap-fullcheck.txt | sed ':a;N;$!ba;s/\n/<br>/g' | sed 's/"/\\"/g')
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"onboarding@resend.dev\",
              \"to\": \"$NOTIFICATION_EMAIL\",
              \"subject\": \"🚨 놀쿨 DEEP audit — sitemap 비정상 URL 발견\",
              \"html\": \"<h2>일요일 KST 03:00 풀체크 실패</h2><p>sitemap.xml URL 중 4xx/5xx/네트워크 에러 발견.</p><p>상세: <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>GitHub Actions 로그</a></p><p>관리자 페이지: <a href='https://nolcool.com/admin'>/admin</a></p><hr><pre>$SUMMARY</pre>\"
            }"

      - name: Fail step if issues found
        if: steps.fullcheck.outcome == 'failure'
        run: |
          echo "::error::Sitemap fullcheck found non-2xx/3xx URLs — see report"
          exit 1
