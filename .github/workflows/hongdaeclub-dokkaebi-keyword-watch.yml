name: Hongdae Dokkaebi Keyword Watch (홍대클럽 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 13:40 (UTC 04:40) — 시즌150
    - cron: '40 4 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hongdaeclub-dokkaebi-keyword-watch
        run: node scripts/hongdaeclub-dokkaebi-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
