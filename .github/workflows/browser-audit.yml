name: Browser Audit (PC + Mobile)

on:
  schedule:
    # 매일 KST 10:00 (UTC 01:00) — live-audit(09:00) 직후 풀크롤 vp=both
    - cron: '0 1 * * *'
    # R2-4 — 매일 KST 04:00 (UTC 19:00 전날) 11 뷰포트 smoke (핵심 30 URL)
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'URL limit (0 = full sitemap ~515)'
        required: false
        default: '50'
      vp:
        description: 'Viewport (pc / mobile / both / all=11vp)'
        required: false
        default: 'both'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run browser audit (PC+Mobile 전체 sitemap)
        id: audit
        env:
          CHROMIUM_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          export CHROMIUM_PATH=$(which chrome || which google-chrome || which chromium)
          echo "Chrome: $CHROMIUM_PATH"
          # 스케줄 실행 분기:
          #   UTC 01:00 (KST 10:00) → 풀크롤 vp=both
          #   UTC 19:00 (KST 04:00) → 11vp smoke (limit 30)
          #   workflow_dispatch → 입력값 우선
          DEFAULT_LIMIT='0'
          DEFAULT_VP='both'
          if [ "${{ github.event.schedule }}" = "0 19 * * *" ]; then
            DEFAULT_LIMIT='30'
            DEFAULT_VP='all'
          fi
          LIMIT="${{ github.event.inputs.limit }}"
          VP="${{ github.event.inputs.vp }}"
          LIMIT="${LIMIT:-$DEFAULT_LIMIT}"
          VP="${VP:-$DEFAULT_VP}"
          echo "Run: limit=$LIMIT vp=$VP"
          node scripts/nolcool-browser-audit.mjs --limit "$LIMIT" --vp "$VP" --concurrency 6 --save /tmp/browser-audit.json 2>&1 | tee /tmp/browser-audit.txt
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-report
          path: |
            /tmp/browser-audit.json
            /tmp/browser-audit.txt
          retention-days: 30

      - name: Send email alert (이슈 발견 시)
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: node scripts/nolcool-browser-audit-report.mjs /tmp/browser-audit.json /tmp/browser-audit.txt

      - name: Fail if issues found
        run: |
          if [ -f /tmp/browser-audit.json ]; then
            issues=$(node -e "console.log(require('/tmp/browser-audit.json').total_issues || 0)")
            echo "Issues found: $issues"
            if [ "$issues" -gt 0 ]; then
              echo "::error::Browser audit found $issues issues across PC+Mobile"
              exit 1
            fi
          fi
