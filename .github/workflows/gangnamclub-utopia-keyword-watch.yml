name: Gangnamclub Utopia Keyword Watch (강남클럽·청담클럽 2 키워드 24h)

on:
  schedule:
    # 매일 KST 12:50 (UTC 03:50) — 시즌140
    - cron: '50 3 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gangnamclub-utopia-keyword-watch
        run: node scripts/gangnamclub-utopia-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
