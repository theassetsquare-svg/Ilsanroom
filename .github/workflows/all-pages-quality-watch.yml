name: All Pages Quality Watch (5축 — anchor 200/img alt/H1/lang+viewport/canonical)

on:
  schedule:
    # 매일 KST 06:25 (UTC 21:25) — keyword-stuffing-pc-mobile-watch 06:20 직후
    - cron: '25 21 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Run all-pages-quality-watch
        run: node scripts/all-pages-quality-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
