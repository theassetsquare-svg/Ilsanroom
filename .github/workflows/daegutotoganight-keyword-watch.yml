name: Daegutotoganight Keyword Watch (대구토토가나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 07:35 (UTC 22:35) — nowonhobaknight 07:30 직후
    - cron: '35 22 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run daegutotoganight-keyword-watch
        run: node scripts/daegutotoganight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
