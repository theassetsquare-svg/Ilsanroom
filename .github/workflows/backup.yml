name: Daily Supabase Backup

on:
  schedule:
    # 매일 KST 03:00 (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backup Supabase tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          mkdir -p backups/$(date -u '+%Y-%m-%d')

          tables=("venues" "user_profiles" "community_posts" "reviews" "reports" "notifications" "daily_stats")

          for table in "${tables[@]}"; do
            echo "Backing up $table..."
            response=$(curl -s -w "\n%{http_code}" \
              "${SUPABASE_URL}/rest/v1/${table}?select=*" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")

            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" = "200" ]; then
              echo "$body" > "backups/$(date -u '+%Y-%m-%d')/${table}.json"
              echo "  ${table}: OK"
            else
              echo "  ${table}: SKIP (${http_code})"
            fi
          done

          echo "Backup completed at $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 시즌165 — 빈 dir/race condition tolerant. push 실패시 rebase 후 1회 재시도.
          dir="backups/$(date -u '+%Y-%m-%d')"
          if [ ! -d "$dir" ] || ! find "$dir" -name '*.json' -size +0c | grep -q .; then
            echo "No backup files generated (SUPABASE_SERVICE_KEY 미설정 또는 모든 테이블 SKIP)"
            exit 0
          fi
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "backup: $(date -u '+%Y-%m-%d') daily backup"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "push 실패 ($i/3) — rebase 후 재시도"
            git pull --rebase origin main || true
            sleep 5
          done
          echo "::warning::backup push 3회 실패 — 다음 cron까지 누적"
          exit 0

      - name: Cleanup old backups (keep 7 days)
        run: |
          if [ -d "backups" ]; then
            find backups -maxdepth 1 -type d -mtime +7 -exec rm -rf {} + 2>/dev/null || true
            git add backups/ 2>/dev/null
            git diff --cached --quiet || git commit -m "backup: cleanup old backups"
            git push 2>/dev/null || true
          fi
