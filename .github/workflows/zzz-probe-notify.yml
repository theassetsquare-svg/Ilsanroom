name: zzz Probe Notify (oneshot)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/_probe_notify.mjs'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/_probe_notify.mjs
