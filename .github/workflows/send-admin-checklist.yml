name: Send GA4 Admin Checklist (manual)

# 대표님께 GA4 관리자 체크리스트(docs/ga4-admin-checklist.md)를 1회 메일 발송.
# 수동 실행 전용(workflow_dispatch). 읽기전용 — 사이트/데이터 변경 0.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Email checklist to admin
        run: node scripts/send-admin-checklist.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
