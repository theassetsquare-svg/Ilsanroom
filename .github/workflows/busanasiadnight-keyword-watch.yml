name: Busanasiadnight Keyword Watch (부산아시아드나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 08:10 (UTC 23:10) — busanmulnight 08:05 직후
    - cron: '10 23 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run busanasiadnight-keyword-watch
        run: node scripts/busanasiadnight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
