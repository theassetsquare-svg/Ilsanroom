name: Auto Content v2 (Time-based)

on:
  schedule:
    # 매 15분마다 실행 (96회/일)
    # KST 기준 시간대별로 글 생성 확률 조정 (auto-content-v2.mjs 내부)
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate post + progressive comments
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/auto-content-v2.mjs
