name: Busanmulnight Keyword Watch (부산물나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 08:05 (UTC 23:05) — doksangukbingwannight 08:00 직후
    - cron: '5 23 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run busanmulnight-keyword-watch
        run: node scripts/busanmulnight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
