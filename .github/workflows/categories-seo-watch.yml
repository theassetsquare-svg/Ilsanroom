name: Categories SEO Watch (6 카테고리 24h 통합)

on:
  schedule:
    # 매일 KST 07:10 (UTC 22:10)
    - cron: '10 22 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run categories-seo-audit (실패시만 메일)
        run: node scripts/categories-seo-audit.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
