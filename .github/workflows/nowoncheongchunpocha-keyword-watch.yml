name: Nowoncheongchunpocha Keyword Watch (노원청춘포차 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 13:10 (UTC 04:10) — 시즌144
    - cron: '10 4 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run nowoncheongchunpocha-keyword-watch
        run: node scripts/nowoncheongchunpocha-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
