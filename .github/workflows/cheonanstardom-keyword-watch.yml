name: Cheonan Stardom Keyword Watch (천안스타돔나이트 + 천안나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 09:45 (UTC 00:45) — changwon-lululalala 09:40 직후
    - cron: '45 0 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cheonanstardom-keyword-watch
        run: node scripts/cheonanstardom-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
