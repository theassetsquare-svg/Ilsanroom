name: Cheongdamh2o Keyword Watch (청담H2O나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 07:20 (UTC 22:20) — all-venues-seo-watch 07:15 직후
    - cron: '20 22 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cheongdamh2o-keyword-watch
        run: node scripts/cheongdamh2o-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
