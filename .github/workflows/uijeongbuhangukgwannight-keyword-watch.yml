name: Uijeongbuhangukgwannight Keyword Watch (의정부한국관나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 09:20 (UTC 00:20) — ulsanchampionnight 09:15 직후
    - cron: '20 0 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run uijeongbuhangukgwannight-keyword-watch
        run: node scripts/uijeongbuhangukgwannight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
