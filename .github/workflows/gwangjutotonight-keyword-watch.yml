name: Gwangjutotonight Keyword Watch (광주토토밤나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 09:20 (UTC 00:20) — gwangjusangmunight 09:15 직후
    - cron: '20 0 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gwangjutotonight-keyword-watch
        run: node scripts/gwangjutotonight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
