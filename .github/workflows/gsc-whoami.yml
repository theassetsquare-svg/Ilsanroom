name: GSC Whoami (diagnostic, one-shot)

on:
  workflow_dispatch:

jobs:
  whoami:
    runs-on: ubuntu-latest
    steps:
      - name: Identify OAuth account + GSC properties
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          node -e '
          (async () => {
            const body = new URLSearchParams({
              client_id: process.env.GOOGLE_OAUTH_CLIENT_ID,
              client_secret: process.env.GOOGLE_OAUTH_CLIENT_SECRET,
              refresh_token: process.env.GOOGLE_REFRESH_TOKEN,
              grant_type: "refresh_token",
            });
            const tr = await fetch("https://oauth2.googleapis.com/token", { method: "POST", body });
            const tj = await tr.json();
            if (!tj.access_token) { console.log("TOKEN FAIL", JSON.stringify(tj)); process.exit(1); }
            console.log("scope:", tj.scope || "(none returned)");
            const ui = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers: { Authorization: "Bearer " + tj.access_token } });
            console.log("userinfo HTTP", ui.status, "→", (await ui.text()).slice(0, 300));
            const sr = await fetch("https://www.googleapis.com/webmasters/v3/sites", { headers: { Authorization: "Bearer " + tj.access_token } });
            const sj = await sr.json();
            console.log("=== OAuth 계정이 보는 모든 속성 ===");
            for (const s of (sj.siteEntry || [])) console.log("  ", s.siteUrl, "|", s.permissionLevel);
            const nol = (sj.siteEntry || []).filter(s => /nolcool/.test(s.siteUrl));
            console.log("=== nolcool 속성 ===", nol.length ? JSON.stringify(nol) : "❌ 없음");
          })();
          '
