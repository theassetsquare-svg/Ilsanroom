name: 24h Auto Build — Cloudflare Pages

on:
  schedule:
    # 6시간 간격 자동 빌드 (UTC 기준 → KST)
    # KST 00:00 (UTC 15:00)
    - cron: '0 15 * * *'
    # KST 06:00 (UTC 21:00)
    - cron: '0 21 * * *'
    # KST 12:00 (UTC 03:00)
    - cron: '0 3 * * *'
    # KST 18:00 (UTC 09:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  trigger-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        run: |
          curl -s -X POST "${{ secrets.CLOUDFLARE_BUILD_HOOK }}"
          echo "Cloudflare Pages rebuild triggered at $(date -u '+%Y-%m-%d %H:%M UTC')"
