name: 24h Auto Build + SEO Notify

on:
  push:
    branches: [main]
  schedule:
    # KST 06:00 (UTC 21:00) - 새벽 빌드
    - cron: '0 21 * * *'
    # KST 18:00 (UTC 09:00) - 저녁 빌드
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        run: |
          curl -s -X POST "${{ secrets.CLOUDFLARE_BUILD_HOOK }}"
          echo "Cloudflare Pages rebuild triggered at $(date -u '+%Y-%m-%d %H:%M UTC')"

      - uses: actions/checkout@v4
        if: github.event_name == 'push'

      - name: Notify search engines (sitemap ping)
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://nolcool.com/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://nolcool.com/sitemap.xml" || true
          echo "Search engines notified"

      - name: Health check after deploy
        run: |
          sleep 60
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://nolcool.com/")
          echo "Site status: $status"
          if [ "$status" != "200" ]; then
            echo "::warning::Site returned $status after deploy"
          fi

      - name: Verify daily freshness meta
        run: |
          today_kst=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          html=$(curl -s "https://nolcool.com/?ts=$(date +%s)")
          if echo "$html" | grep -q "name=\"date\" content=\"$today_kst\""; then
            echo "[OK] meta date == $today_kst"
          else
            echo "::warning::meta date mismatch (expected $today_kst)"
          fi
          # sitemap lastmod also checked
          smap=$(curl -s "https://nolcool.com/sitemap.xml")
          if echo "$smap" | grep -q "<lastmod>$today_kst</lastmod>"; then
            echo "[OK] sitemap lastmod == $today_kst"
          else
            echo "::warning::sitemap lastmod mismatch (expected $today_kst)"
          fi
