name: Daily SEO Build

on:
  schedule:
    # 매일 한국시간 오전 6시 (UTC 21:00) 자동 빌드
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  trigger-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        run: |
          curl -s -X POST "${{ secrets.CLOUDFLARE_BUILD_HOOK }}"
          echo "Cloudflare Pages rebuild triggered"
