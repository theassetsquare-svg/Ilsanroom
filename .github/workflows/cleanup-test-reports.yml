name: Cleanup Test Reports (one-shot)
on:
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Delete test venue_reports (fingerprint LIKE claude_%)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node -e "
            const url = process.env.SUPABASE_URL || 'https://rkqnblbajhnehmxfnvri.supabase.co';
            const key = process.env.SUPABASE_SERVICE_KEY;
            const h = { apikey: key, Authorization: 'Bearer '+key, 'Content-Type':'application/json', Prefer:'return=representation' };
            (async () => {
              const before = await (await fetch(url+'/rest/v1/venue_reports?reporter_fingerprint=like.claude_*&select=id,venue_slug,reporter_fingerprint', { headers: h })).json();
              console.log('targets:', JSON.stringify(before));
              const del = await fetch(url+'/rest/v1/venue_reports?reporter_fingerprint=like.claude_*', { method:'DELETE', headers: h });
              const deleted = await del.json();
              console.log('deleted:', JSON.stringify(deleted));
              // reporter_trust도 함께 정리
              await fetch(url+'/rest/v1/reporter_trust?fingerprint=like.claude_*', { method:'DELETE', headers: h });
              const after = await (await fetch(url+'/rest/v1/venue_reports?reporter_fingerprint=like.claude_*&select=id', { headers: h })).json();
              console.log('remaining:', after.length);
              if (after.length > 0) process.exit(1);
            })().catch(e => { console.error(e); process.exit(1); });
          "
