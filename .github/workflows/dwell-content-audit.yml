name: Dwell Content Audit (체류 10분 보장 본문 분량)

on:
  schedule:
    # 매일 KST 07:40 (UTC 22:40)
    - cron: '40 22 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dwell-content-audit
        run: node scripts/dwell-content-audit.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
