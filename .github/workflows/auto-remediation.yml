name: Auto Remediation (서치콘솔 메일 자동 정리 — 닫힌 루프)

# 닫힌 루프의 메일-정리 절반.
#   - 감지(전체 sitemap inspect): google-issue-monitor.yml 가 매일 KST 08:30 담당 (그대로 둠)
#   - 이 워크플로: GSC가 Gmail로 보낸 문제 알림 메일을 6시간마다 읽어, 메일이 가리키는
#     URL만 골라 검증(quota-light) → 해결됐으면 휴지통, 아직 깨졌으면 보존+재크롤+사람알림,
#     보안/수동조치는 절대 자동삭제 X.
#
# 왜 여기서 google-issue-monitor 를 다시 안 돌리나:
#   google-issue-monitor 는 1회에 sitemap ~1500 URL 을 inspect 한다. 6시간마다(=하루 4회)
#   돌리면 4×1500 = GSC URL Inspection 일일 quota(2000)를 초과한다. 그래서 전체-크롤 감지는
#   기존 일 1회 스케줄에 두고, 여기선 "메일에 적힌 URL만" 검증하는 quota 가벼운 gmail-autofix
#   만 6시간마다 돌린다. 두 워크플로는 중복이 아니라 상호보완.

on:
  workflow_dispatch:
  schedule:
    # 6시간마다 (UTC 0/6/12/18시 = KST 9/15/21/3시)
    - cron: '0 */6 * * *'

jobs:
  gmail-autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 서치콘솔 메일 읽기 + 해결확인 + 정리 (GMAIL_* 시크릿 없으면 graceful skip)
        run: node scripts/gmail-autofix.mjs
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
