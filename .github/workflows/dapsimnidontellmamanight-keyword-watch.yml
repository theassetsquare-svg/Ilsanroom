name: Dapsimnidontellmamanight Keyword Watch (답십리돈텔마마나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 09:25 (UTC 00:25) — gwangjutotonight 09:20 직후
    - cron: '25 0 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run dapsimnidontellmamanight-keyword-watch
        run: node scripts/dapsimnidontellmamanight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
