name: Jeonju Hoppa Gallery Keyword Watch (전주호빠 단일 키워드 24h)

on:
  schedule:
    # 매일 KST 11:30 (UTC 02:30) — 시즌124
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run jeonju-hoppa-gallery-keyword-watch
        run: node scripts/jeonju-hoppa-gallery-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
