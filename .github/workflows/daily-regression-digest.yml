name: Daily Regression Digest (KST 09:00)

on:
  schedule:
    # 매일 KST 09:00 (UTC 00:00) — Actions 24h 회귀 다이제스트 1통
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Daily regression digest
        run: node scripts/daily-regression-digest.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

      - name: Commit snapshot for /admin/audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/admin/actions-digest.json)" ]; then
            git add public/admin/actions-digest.json
            git commit -m "chore(admin): actions-digest 24h snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no snapshot diff"
          fi
