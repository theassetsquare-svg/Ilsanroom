name: Gangnamclub Jack Keyword Watch (강남클럽·청담클럽 2 키워드 24h)

on:
  schedule:
    # 매일 KST 13:05 (UTC 04:05) — 시즌143
    - cron: '5 4 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gangnamclub-jack-keyword-watch
        run: node scripts/gangnamclub-jack-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
