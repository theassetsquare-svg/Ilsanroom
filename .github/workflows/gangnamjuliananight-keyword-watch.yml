name: Gangnamjuliananight Keyword Watch (강남줄리아나나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 07:45 (UTC 22:45) — daejeonsevennight 07:40 직후
    - cron: '45 22 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gangnamjuliananight-keyword-watch
        run: node scripts/gangnamjuliananight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
