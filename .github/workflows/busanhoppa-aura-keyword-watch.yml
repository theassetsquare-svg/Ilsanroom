name: Busanhoppa Aura Keyword Watch (부산호빠+해운대호빠 2 키워드 24h)

on:
  schedule:
    # 매일 KST 11:05 (UTC 02:05) — 시즌119
    - cron: '5 2 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run busanhoppa-aura-keyword-watch
        run: node scripts/busanhoppa-aura-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
