name: Suwonchancenight Keyword Watch (수원찬스돔나이트 2 키워드 24h)

on:
  schedule:
    # 매일 KST 08:40 (UTC 23:40) — seongnamshampoonight 08:35 직후
    - cron: '40 23 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run suwonchancenight-keyword-watch
        run: node scripts/suwonchancenight-keyword-watch.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
