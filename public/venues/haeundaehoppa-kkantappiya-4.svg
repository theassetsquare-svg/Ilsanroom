<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="nightsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0b2e;stop-opacity:1"/>
      <stop offset="45%" style="stop-color:#2d1b4e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0b2447;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3d9a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff7ec4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5cf0ff;stop-opacity:1"/>
    </linearGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Night sky background -->
  <rect width="1080" height="1080" fill="url(#nightsky)"/>

  <!-- City neon bokeh -->
  <circle cx="120" cy="180" r="60" fill="#ff3d9a" opacity="0.18"/>
  <circle cx="960" cy="240" r="80" fill="#00e5ff" opacity="0.15"/>
  <circle cx="200" cy="900" r="90" fill="#ff7ec4" opacity="0.12"/>
  <circle cx="900" cy="860" r="70" fill="#5cf0ff" opacity="0.15"/>
  <circle cx="540" cy="1020" r="110" fill="#ff3d9a" opacity="0.1"/>

  <!-- Top badge -->
  <text x="540" y="130" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="700" fill="#00e5ff" letter-spacing="0.3em" filter="url(#softGlow)">HAEUNDAE · NO.1</text>
  <text x="540" y="190" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="500" fill="rgba(255,255,255,0.85)" letter-spacing="0.22em">부산 해운대 호스트바</text>

  <!-- Divider -->
  <line x1="380" y1="230" x2="700" y2="230" stroke="#ff3d9a" stroke-width="2" opacity="0.7"/>

  <!-- Main neon card -->
  <rect x="90" y="280" width="900" height="540" rx="32" fill="rgba(0,0,0,0.55)" stroke="url(#neonPink)" stroke-width="4" filter="url(#neonGlow)"/>

  <!-- 여성전용 label -->
  <text x="540" y="360" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="900" fill="url(#neonPink)" filter="url(#neonGlow)" letter-spacing="0.15em">여성전용</text>

  <!-- 해운대호빠 -->
  <text x="540" y="440" text-anchor="middle" font-family="sans-serif" font-size="58" font-weight="900" fill="white" filter="url(#strongShadow)" letter-spacing="0.05em">해운대호빠</text>

  <!-- 깐따삐야 -->
  <text x="540" y="555" text-anchor="middle" font-family="sans-serif" font-size="120" font-weight="900" fill="url(#neonPink)" filter="url(#neonGlow)" letter-spacing="-0.01em">깐따삐야</text>

  <!-- 실장 수빈 badge -->
  <rect x="330" y="610" width="420" height="80" rx="40" fill="rgba(0,229,255,0.15)" stroke="url(#neonCyan)" stroke-width="3"/>
  <text x="540" y="665" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="800" fill="#00e5ff" filter="url(#softGlow)" letter-spacing="0.08em">★ 실장 수빈 ★</text>

  <!-- Phone -->
  <text x="540" y="780" text-anchor="middle" font-family="sans-serif" font-size="76" font-weight="900" fill="white" filter="url(#strongShadow)" letter-spacing="0.05em">010-6773-6222</text>

  <!-- Bottom info -->
  <rect x="140" y="870" width="800" height="80" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="540" y="905" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="0.08em">📞 24시간 예약 · 픽업 · 카카오톡 문의</text>
  <text x="540" y="938" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.7)" letter-spacing="0.1em">해운대역 · 센텀시티역 · 부산역 10분 내 도착</text>

  <text x="540" y="1010" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.4)" letter-spacing="0.15em">nolcool.com · 놀쿨</text>
</svg>
