<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="300" fill="rgba(236,72,153,0.08)"/>
  <circle cx="1000" cy="900" r="350" fill="rgba(139,92,246,0.08)"/>
  <circle cx="600" cy="600" r="200" fill="rgba(255,215,0,0.05)"/>

  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="1120" rx="32" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
  <rect x="60" y="60" width="1080" height="1080" rx="24" fill="rgba(255,255,255,0.03)"/>

  <!-- Top label -->
  <text x="600" y="200" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="600" fill="rgba(255,255,255,0.6)" letter-spacing="0.15em">NIGHT CLUB</text>

  <!-- Main venue name -->
  <text x="600" y="380" text-anchor="middle" font-family="sans-serif" font-size="88" font-weight="900" fill="white" filter="url(#textShadow)" letter-spacing="-0.02em">답십리돈텔마마</text>

  <!-- Star decoration -->
  <text x="460" y="500" text-anchor="middle" font-family="sans-serif" font-size="40" fill="#FFD700">★</text>
  <text x="740" y="500" text-anchor="middle" font-family="sans-serif" font-size="40" fill="#FFD700">★</text>

  <!-- 천사 - Main highlight -->
  <rect x="350" y="520" width="500" height="180" rx="20" fill="rgba(255,215,0,0.15)" stroke="url(#gold)" stroke-width="3"/>
  <text x="600" y="640" text-anchor="middle" font-family="sans-serif" font-size="130" font-weight="900" fill="url(#gold)" filter="url(#glow)">천사</text>

  <!-- Subtitle -->
  <text x="600" y="790" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="600" fill="rgba(255,255,255,0.7)">답십리 No.1 나이트클럽</text>

  <!-- Divider line -->
  <line x1="400" y1="850" x2="800" y2="850" stroke="rgba(255,215,0,0.4)" stroke-width="2"/>

  <!-- Phone icon + number -->
  <text x="600" y="940" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="700" fill="#4ADE80">📞 전화 예약</text>
  <text x="600" y="1010" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="900" fill="white" filter="url(#textShadow)">010-3763-7882</text>

  <!-- Bottom label -->
  <text x="600" y="1110" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.4)">nolcool.com</text>
</svg>
